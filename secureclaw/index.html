<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: #04070d; color: #e9f4fa; font-family: 'Space Grotesk', sans-serif; display: flex; flex-direction: column; }
  a { color: #3fe0c8; text-decoration: none; }
  a:hover { color: #7defd9; }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  @keyframes caret { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes snip { 0%,100% { transform: rotate(0deg); } 8% { transform: rotate(-6deg); } 16% { transform: rotate(0deg); } }
  .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; }

  .sub { margin: 0 auto 36px; max-width: 560px; font-size: 17px; line-height: 1.6; color: #8fa9bf; }
  .badge { display: inline-flex; align-items: center; gap: 9px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #3fe0c8; border: 1px solid #17524766; background: #0c211b66; padding: 7px 14px; border-radius: 6px; margin-bottom: 30px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #3fe0c8; box-shadow: 0 0 8px #3fe0c8; animation: pulse 1.6s infinite; }
  .term { display: inline-flex; align-items: center; gap: 12px; background: #0a1119; border: 1px solid #182739; border-radius: 10px; padding: 14px 18px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #d8ecf8; }
  .term .p { color: #3fe0c8; font-weight: 700; }
  .term .c { width: 2px; height: 16px; background: #3fe0c8; animation: caret 1.1s steps(1) infinite; }
  .foot { padding: 20px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #5e7a93; border-top: 1px solid #0d1622; }
  .claw { animation: snip 3.5s ease-in-out infinite; transform-origin: 35% 60%; filter: drop-shadow(0 0 12px #3b7dff66); margin-bottom: 26px; }
